version: '3.8'
services:
  redis: 
    image: docker-registry-002.zeuslearning.com/zeuslearning/redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
  
volumes:
  redis-data:
    driver: local